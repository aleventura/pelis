<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>

<script>
let M=[];
const LS='plexTest10_v6';
let st=JSON.parse(localStorage.getItem(LS)||'{}');
/* ===== Sync con Google Sheets (Apps Script). Pega tu URL /exec abajo. ===== */
const SYNC_URL='https://script.google.com/macros/s/AKfycbxWisBFcp2Ykk3smw_V2ATeAzP5R_wWV_iB0ZXFkuEU0iEOLOjRcvB0Uh5BLNwzszgQ3g/exec';
let pushTimer=null, pending=false;
function syncOff(){ return !SYNC_URL || SYNC_URL.indexOf('PEGA_AQUI')>=0; }
/* ---- badge de estado (diagnóstico) ---- */
function syncBadge(){
  let b=document.getElementById('syncBadge');
  if(!b){ b=document.createElement('div'); b.id='syncBadge';
    b.style.cssText='position:fixed;left:8px;bottom:8px;z-index:9999;font:12px/1.3 system-ui,sans-serif;padding:6px 10px;border-radius:8px;background:#222;color:#eee;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;max-width:70vw';
    b.title='Toca para forzar guardado en la Sheet';
    b.onclick=function(){ pushRemote(); };
    document.body.appendChild(b);
  }
  return b;
}
function setSync(txt,color){ const b=syncBadge(); b.textContent='Sheet: '+txt; b.style.background=color||'#222'; }
/* ---- comparación estable (ignora orden de claves) ---- */
function stable(o){
  if(o===null||typeof o!=='object')return JSON.stringify(o);
  if(Array.isArray(o))return '['+o.map(stable).join(',')+']';
  return '{'+Object.keys(o).sort().map(function(k){return JSON.stringify(k)+':'+stable(o[k]);}).join(',')+'}';
}
function jsonp(cb){
  const name='__pelisCb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
  const s=document.createElement('script');
  const to=setTimeout(function(){cleanup();cb(null,'timeout');},8000);
  function cleanup(){ clearTimeout(to); try{delete window[name];}catch(e){} if(s.parentNode)s.remove(); }
  window[name]=function(data){ cleanup(); cb(data,null); };
  s.onerror=function(){ cleanup(); cb(null,'error'); };
  s.src=SYNC_URL+'?callback='+name+'&t='+Date.now();
  document.body.appendChild(s);
}
function pullRemote(){
  if(syncOff()){ setSync('sync apagada (sin URL)','#a33'); return; }
  setSync('leyendo…','#555');
  jsonp(function(data,err){
    if(err){ setSync('no respondió al leer ('+err+')','#a33'); return; }
    try{ if(data&&typeof data==='object'){ st=data; localStorage.setItem(LS,JSON.stringify(st)); if(typeof render==='function')render(); } }catch(e){}
    const n=data&&typeof data==='object'?Object.keys(data).length:0;
    setSync('leído ✓ ('+n+' pelis)','#2a6');
  });
}
function pushRemote(){
  pending=false;
  if(syncOff()){ setSync('sync apagada (sin URL)','#a33'); return; }
  const sent=JSON.parse(JSON.stringify(st));
  setSync('enviando…','#555');
  try{ fetch(SYNC_URL,{method:'POST',mode:'no-cors',body:new URLSearchParams({data:JSON.stringify(st)})}); }
  catch(e){ setSync('falló el envío ('+e.message+')','#a33'); return; }
  setSync('enviado, verificando…','#777');
  setTimeout(function(){
    jsonp(function(data,err){
      if(err){ setSync('enviado, pero no pude releer ('+err+')','#a63'); return; }
      if(data&&typeof data==='object' && stable(data)===stable(sent)){
        const t=new Date().toTimeString().slice(0,8);
        setSync('guardado ✓ '+t,'#2a6');
      } else {
        const n=data&&typeof data==='object'?Object.keys(data).length:0;
        setSync('SIN CONFIRMAR ✗ (A1 tiene '+n+' pelis)','#c33');
      }
    });
  },2200);
}
function schedulePush(){ pending=true; setSync('cambios pendientes…','#96792b'); clearTimeout(pushTimer); pushTimer=setTimeout(pushRemote,2000); }
window.addEventListener('beforeunload',function(){ if(pending)pushRemote(); });
let filter='pend', genreFilter='', platFilter='', personaFilter=[], prioFilter='';
const PEOPLE=[['ale','Ale'],['alex','Alex'],['ric','Ric'],['ariela','Ariela']];
const PEOPLELAB=Object.fromEntries(PEOPLE);
// Preselección por id. Vacía a propósito: sin perfiles fiables de cada persona,
// prefiero no marcar a nadie. Rellena aquí cuando tengas criterio, p.ej. {"tt0166924":["alex"]}.
let PRE={};
// ===================== HUECOS PARA CLAUDE EN CHROME =====================
// Ver la sección 'Instrucciones para el asistente' al inicio de la página.
// Rellena SOLO estos dos objetos; no toques el array M ni las carátulas.
let MOTIVOS={};
const NUEVAS=[];    // [ { id,t,y,d,g:[],cr,dur,imdb,votes,hist:{1..10},thumb,s }, ... ] del listado
// =======================================================================
function save(){localStorage.setItem(LS,JSON.stringify(st));autoWrite();schedulePush();}
function getPara(id,m){ const s=st[id]; return (s&&s.para!==undefined)?s.para:((m&&m.pre)||[]); }
function togglePara(id,p,m){ const cur=getPara(id,m).slice(); const i=cur.indexOf(p); if(i>=0)cur.splice(i,1); else cur.push(p); st[id]=Object.assign({},st[id],{para:cur}); save(); render(); }
function getPrio(id){ return (st[id]&&st[id].prio)||''; }
function setPrio(id,p){ const cur=getPrio(id); st[id]=Object.assign({},st[id],{prio:cur===p?null:p}); save(); render(); }
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function getState(id,m){const s=st[id]&&st[id].state;if(s)return s;return (m&&m.nuevo)?'nueva':'pend';}
function setState(id,s){st[id]=Object.assign({},st[id],{state:s});save();render();}
function collapseRow(row,done){
  const h=row.offsetHeight;
  row.style.boxSizing='border-box';row.style.overflow='hidden';row.style.height=h+'px';
  void row.offsetHeight; // fuerza reflow para que la transición arranque desde h
  row.style.transition='height .30s ease, opacity .30s ease, margin .30s ease, padding .30s ease, transform .30s ease, border-width .30s ease';
  row.style.opacity='0';row.style.transform='translateX(16px)';row.style.height='0px';
  row.style.marginTop='0';row.style.marginBottom='0';row.style.paddingTop='0';row.style.paddingBottom='0';
  row.style.borderTopWidth='0';row.style.borderBottomWidth='0';
  let fired=false;
  const fin=function(){ if(fired)return; fired=true; done(); };
  row.addEventListener('transitionend',function(e){ if(e.propertyName==='height') fin(); });
  setTimeout(fin,400); // respaldo por si transitionend no dispara
}

document.getElementById('exp').onclick=async()=>{
  if(HASFS){
    try{
      const h=await window.showSaveFilePicker({suggestedName:'peliculas_estado.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
      fileHandle=h; await writeNow(); setLink(true); return;
    }catch(e){ if(e&&e.name==='AbortError') return; }
  }
  downloadExport();
};
document.getElementById('imp').onclick=async()=>{
  if(HASFS){
    try{
      const [h]=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});
      const f=await h.getFile();
      const data=JSON.parse(await f.text());
      if(applyImport(data)){ fileHandle=h; setLink(true); }
      return;
    }catch(e){ if(e&&e.name==='AbortError') return; if(e instanceof SyntaxError){ alert('JSON inválido: '+e.message); return; } }
  }
  document.getElementById('impfile').click();
};
document.getElementById('impfile').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ applyImport(JSON.parse(r.result)); }catch(err){ alert('JSON inválido: '+err.message); } };
  r.readAsText(f); e.target.value='';
};
(function loadCatalog(){
  var applied=false;
  function apply(cat){
    if(applied)return; applied=true;
    M=cat.m||[]; PRE=cat.pre||{}; MOTIVOS=cat.motivos||{}; CRUCE=cat.cruce||{};
    STREAM=cat.stream||{}; ENG=cat.eng||{}; CAST=cat.cast||{};
    if(typeof prepararM==='function')prepararM();
    render();
    pullRemote();
  }
  fetch('catalogo.json?t='+Date.now())
    .then(function(r){ if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); })
    .then(apply)
    .catch(function(e){
      var g=document.getElementById('grid');
      if(g)g.innerHTML='<div class="empty">No se pudo cargar el catálogo (catalogo.json). '+e.message+'</div>';
    });
})();
document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible' && !pending) pullRemote(); });

// ===== Playlists (importadas de playlists_imdb.json del proyecto) =====
const PLAYLISTS={};
const PL_TOTAL=104;
function plAvg(items){const n=items.filter(x=>typeof x.nota==='number');return n.length?(n.reduce((a,b)=>a+b.nota,0)/n.length):null;}
function renderPlaylists(){
  const w=document.getElementById('plwrap');
  const names=Object.keys(PLAYLISTS);
  let html='<div class="plsec-title">Playlists</div><div class="plsec-sub">'+names.length+' listas · '+PL_TOTAL+' títulos. Importadas del proyecto; solo con título, año y nota IMDb. Toca cada lista para plegar.</div>';
  names.forEach((name,i)=>{
    const items=PLAYLISTS[name];const a=plAvg(items);
    html+='<div class="plgroup" data-i="'+i+'"><div class="plhead"><span class="chev">▾</span>'+esc(name)+'<span class="cnt">'+items.length+'</span>'+(a!=null?'<span class="plavg">media '+a.toFixed(1)+'</span>':'')+'</div><div class="plbody">'+
      items.map(it=>'<span class="plchip">'+esc(it.titulo)+' <span class="plyear">('+esc(String(it.anio))+')</span>'+(it.nota!=null?'<span class="plnota">'+it.nota+'</span>':'')+'</span>').join('')+
      '</div></div>';
  });
  w.innerHTML=html;
  w.querySelectorAll('.plhead').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('collapsed'));
}
renderPlaylists();
